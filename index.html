    <style>
      #urabapp-boot {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1.5rem;
        font-family: Poppins, system-ui, sans-serif;
        background: #F7FAFC;
        color: #0D2B45;
      }
      html.dark #urabapp-boot { background: #061525; color: #F7FAFC; }
      #urabapp-boot .logo {
        width: auto;
        height: 4.5rem;
        max-width: min(72vw, 12rem);
        object-fit: contain;
        background: transparent;
      }
      #urabapp-boot .spinner {
        width: 1.75rem;
        height: 1.75rem;
        border: 3px solid rgba(40, 180, 99, 0.2);
        border-top-color: #28B463;
        border-radius: 50%;
        animation: urabapp-spin 0.8s linear infinite;
      }
      @keyframes urabapp-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <script>
      (function () {
        var t = localStorage.getItem('urabapp-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }

        window.__urabappBootOk = function () {
          sessionStorage.removeItem('urabapp-sw-recover');
        };

        window.__urabappRecover = function (force) {
          try {
            var key = 'urabapp-sw-recover';
            var count = Number(sessionStorage.getItem(key) || '0');
            if (!force && count >= 3) return;
            sessionStorage.setItem(key, String(count + 1));
            var tasks = [];
            if ('serviceWorker' in navigator) {
              tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              }));
            }
            if ('caches' in window) {
              tasks.push(caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }));
            }
            Promise.all(tasks).finally(function () {
              var url = new URL(window.location.href);
              url.searchParams.set('v', String(Date.now()));
              window.location.replace(url.toString());
            });
          } catch (e) {
            window.location.reload();
          }
        };

        function shouldRecoverAsset(msg) {
          if (!msg) return false;
          msg = String(msg);
          return msg.indexOf('/assets/') !== -1
            || /Failed to fetch dynamically imported module/i.test(msg)
            || /Importing a module script failed/i.test(msg)
            || /error loading dynamically imported module/i.test(msg);
        }

        window.addEventListener('error', function (e) {
          var el = e.target;
          if (el && el.tagName === 'SCRIPT' && el.src && shouldRecoverAsset(el.src)) {
            window.__urabappRecover();
            return;
          }
          if (shouldRecoverAsset(e.message)) {
            window.__urabappRecover();
          }
        }, true);

        window.addEventListener('unhandledrejection', function (e) {
          var msg = (e.reason && e.reason.message) || String(e.reason || '');
          if (shouldRecoverAsset(msg)) window.__urabappRecover();
        });

        window.setTimeout(function () {
          var boot = document.getElementById('urabapp-boot');
          if (boot) {
            boot.innerHTML = '<img class="logo" src="/urabapp-logo-transparent.png" alt="Urabapp" /><p style="margin:0;font-size:14px;text-align:center;font-weight:600">Actualizando Urabapp…</p><div class="spinner"></div>';
            window.__urabappRecover();
          }
        }, 14000);

      })();
    </script>
    <div id="root">
      <div id="urabapp-boot" role="status" aria-live="polite">
        <img class="logo" src="/urabapp-logo-transparent.png" alt="Urabapp" />
        <p style="margin:0;font-size:15px;font-weight:600">Cargando Urabapp…</p>
        <div class="spinner" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
