project_id = "ekqaocauvoajpjyraeyo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://urabapp.vercel.app"
additional_redirect_urls = [
  "https://urabapp.vercel.app/**",
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
  "http://localhost:5173",
  "http://127.0.0.1:5173",
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

