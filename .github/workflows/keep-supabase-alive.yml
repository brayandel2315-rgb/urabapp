# Ping Supabase cada 6 h — evita pausa del proyecto en plan gratuito
# Configura en GitHub: Settings -> Secrets -> VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY

name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ping Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/keep-supabase-alive.mjs --once
