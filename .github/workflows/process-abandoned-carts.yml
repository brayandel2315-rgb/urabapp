# DESACTIVADO el schedule: fallaba cada 30 min por secrets de GitHub
# y enviaba correos diarios "All jobs have failed".
#
# El cron ahora corre en Supabase (pg_cron → process_abandoned_carts).
# Migración: 120_process_abandoned_carts_cron.sql
#
# Este workflow queda solo para prueba manual (opcional).

name: Process Abandoned Carts

on:
  workflow_dispatch:

jobs:
  nudge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Invoke process-abandoned-carts (manual)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Missing VITE_SUPABASE_URL — el cron productivo ya está en Supabase pg_cron."
            exit 0
          fi
          URL="${SUPABASE_URL%/}/functions/v1/process-abandoned-carts"
          if [ -n "${SERVICE_ROLE:-}" ]; then
            curl -fsS -X POST "$URL" \
              -H "Authorization: Bearer ${SERVICE_ROLE}" \
              -H "apikey: ${SERVICE_ROLE}" \
              -H "Content-Type: application/json" \
              -d '{}'
          elif [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS -X POST "$URL" \
              -H "X-Cron-Secret: ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              -d '{}'
          else
            echo "Sin SUPABASE_SERVICE_ROLE_KEY/CRON_SECRET — usar pg_cron en Supabase."
            exit 0
          fi
